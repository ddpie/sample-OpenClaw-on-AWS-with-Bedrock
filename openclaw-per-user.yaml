AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  OpenClaw Per-User Instance — Deploys into a shared VPC from vpc-shared.yaml.
  Requires VpcId, SubnetId, and AvailabilityZone from the shared VPC stack outputs.

Metadata:
  cfn-lint:
    config:
      ignore_checks:
        - E6101
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Network Configuration (from vpc-shared stack)"
        Parameters:
          - VpcId
          - SubnetId
          - AvailabilityZone
          - AllowedSSHCIDR
      - Label:
          default: "Basic Configuration"
        Parameters:
          - OpenClawModel
          - InstanceType
          - KeyPairName

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC ID from the shared VPC stack (vpc-shared.yaml Outputs)"

  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: "Public Subnet ID from the shared VPC stack. Must be in the same AZ as AvailabilityZone."

  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Description: "Availability Zone matching the selected SubnetId (e.g. us-west-2a). Check vpc-shared stack Outputs."

  OpenClawModel:
    Type: String
    Default: "global.amazon.nova-2-lite-v1:0"
    Description: "Bedrock model ID - Nova 2 Lite offers best price-performance for everyday tasks"
    AllowedValues:
      - "global.amazon.nova-2-lite-v1:0"
      - "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
      - "us.amazon.nova-pro-v1:0"
      - "global.anthropic.claude-opus-4-6-v1"
      - "global.anthropic.claude-opus-4-5-20251101-v1:0"
      - "global.anthropic.claude-haiku-4-5-20251001-v1:0"
      - "global.anthropic.claude-sonnet-4-20250514-v1:0"
      - "us.deepseek.r1-v1:0"
      - "us.meta.llama3-3-70b-instruct-v1:0"
      - "moonshotai.kimi-k2.5"

  InstanceType:
    Type: String
    Default: "c7g.large"
    Description: "Graviton (ARM) recommended for 20-40% better price-performance. x86 also supported."
    AllowedValues:
      - "t4g.small"
      - "t4g.medium"
      - "t4g.large"
      - "t4g.xlarge"
      - "c6g.large"
      - "c6g.xlarge"
      - "c7g.large"
      - "c7g.xlarge"
      - "t3.small"
      - "t3.medium"
      - "t3.large"
      - "c5.xlarge"

  KeyPairName:
    Type: String
    Default: "none"
    Description: "EC2 key pair for emergency SSH access (optional - set to 'none' to skip)"

  AllowedSSHCIDR:
    Type: String
    Default: ""
    Description: "CIDR for SSH access (optional - leave empty for no inbound rules. SSM Session Manager is used for access. If SSH is needed, set to your IP/32 - find your IP at checkip.amazonaws.com)"

  EnableSandbox:
    Type: String
    Default: "true"
    Description: "Install Docker for sandboxed execution (recommended for group chats)"

  EnableDataProtection:
    Type: String
    Default: "false"
    Description: "Retain data volume when stack is deleted (protects against accidental data loss)"
    AllowedValues:
      - "true"
      - "false"

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, "none"]]
  AllowSSH: !And
    - !Not [!Equals [!Ref AllowedSSHCIDR, ""]]
    - !Not [!Equals [!Ref KeyPairName, "none"]]
  EnableDocker: !Equals [!Ref EnableSandbox, "true"]
  ProtectData: !Equals [!Ref EnableDataProtection, "true"]
  DeleteData: !Not [!Equals [!Ref EnableDataProtection, "true"]]

Mappings:
  # Architecture detection based on instance type
  ArchitectureMap:
    t3.small: { Arch: "amd64" }
    t3.medium: { Arch: "amd64" }
    t3.large: { Arch: "amd64" }
    t3.xlarge: { Arch: "amd64" }
    c5.xlarge: { Arch: "amd64" }
    t4g.small: { Arch: "arm64" }
    t4g.medium: { Arch: "arm64" }
    t4g.large: { Arch: "arm64" }
    t4g.xlarge: { Arch: "arm64" }
    c6g.large: { Arch: "arm64" }
    c6g.xlarge: { Arch: "arm64" }
    c7g.large: { Arch: "arm64" }
    c7g.xlarge: { Arch: "arm64" }


Resources:
  # ==================== Wait Condition ====================
  OpenClawWaitHandle:
    Type: AWS::CloudFormation::WaitConditionHandle

  OpenClawWaitCondition:
    Type: AWS::CloudFormation::WaitCondition
    DependsOn: OpenClawInstance
    Properties:
      Handle: !Ref OpenClawWaitHandle
      Timeout: '900'
      Count: 1

  # ==================== IAM Role ====================
  OpenClawInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: 'sts:AssumeRole'
      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore'
        - 'arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy'
      Policies:
        - PolicyName: BedrockAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'bedrock:InvokeModel'
                  - 'bedrock:InvokeModelWithResponseStream'
                  - 'bedrock:ListFoundationModels'
                  - 'bedrock:GetFoundationModel'
                Resource: '*'
        - PolicyName: SSMParameterPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - 'ssm:PutParameter'
                  - 'ssm:GetParameter'
                Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/openclaw/${AWS::StackName}/*'
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-instance-role"

  OpenClawInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref OpenClawInstanceRole

  # ==================== Security Group ====================
  OpenClawSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "OpenClaw instance security group"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - !If
          - AllowSSH
          - IpProtocol: tcp
            FromPort: 22
            ToPort: 22
            CidrIp: !Ref AllowedSSHCIDR
            Description: "SSH access (fallback)"
          - !Ref AWS::NoValue
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: "0.0.0.0/0"
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-sg"

  # ==================== Data Volume ====================
  OpenClawDataVolumeRetained:
    Type: AWS::EC2::Volume
    Condition: ProtectData
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      Size: 30
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-data"

  OpenClawDataVolumeNotRetained:
    Type: AWS::EC2::Volume
    Condition: DeleteData
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      AvailabilityZone: !Ref AvailabilityZone
      Size: 30
      VolumeType: gp3
      Encrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-data"

  # ==================== EC2 Instance ====================
  OpenClawInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Sub 
        - '{{resolve:ssm:/aws/service/canonical/ubuntu/server/24.04/stable/current/${Arch}/hvm/ebs-gp3/ami-id}}'
        - Arch: !FindInMap [ArchitectureMap, !Ref InstanceType, Arch]
      InstanceType: !Ref InstanceType
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
      IamInstanceProfile: !Ref OpenClawInstanceProfile
      Volumes:
        - Device: /dev/sdf
          VolumeId: !If [ProtectData, !Ref OpenClawDataVolumeRetained, !Ref OpenClawDataVolumeNotRetained]
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          GroupSet:
            - !Ref OpenClawSecurityGroup
          SubnetId: !Ref SubnetId
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 30
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          # Remove set -e to prevent script from stopping on errors
          
          exec > >(tee /var/log/openclaw-setup.log)
          exec 2>&1
          
          echo "=========================================="
          echo "OpenClaw AWS Setup: $(date)"
          echo "=========================================="
          
          export DEBIAN_FRONTEND=noninteractive
          
          # Mount data volume
          DATA_DEVICE=""
          for dev in /dev/nvme1n1 /dev/xvdf /dev/sdf; do
            if [ -b "$dev" ]; then
              DATA_DEVICE="$dev"
              break
            fi
          done
          # Fallback: find by lsblk (second disk, not root)
          if [ -z "$DATA_DEVICE" ]; then
            DATA_DEVICE=$(lsblk -dpno NAME,TYPE | awk '$2=="disk"{print $1}' | grep -v "$(findmnt -n -o SOURCE / | sed 's/p[0-9]*$//')" | head -1)
          fi
          
          if [ -n "$DATA_DEVICE" ] && [ -b "$DATA_DEVICE" ]; then
            if ! blkid "$DATA_DEVICE" | grep -q ext4; then
              echo "Formatting $DATA_DEVICE..."
              mkfs.ext4 -L openclaw-data "$DATA_DEVICE"
            fi
            mkdir -p /data
            mount "$DATA_DEVICE" /data || true
            grep -q "$DATA_DEVICE" /etc/fstab || \
              echo "$DATA_DEVICE /data ext4 defaults,nofail 0 2" >> /etc/fstab
            mkdir -p /data/openclaw
            chown ubuntu:ubuntu /data/openclaw
            [ -L /home/ubuntu/.openclaw ] || ln -sf /data/openclaw /home/ubuntu/.openclaw
          fi
          
          # System update
          apt-get update && apt-get upgrade -y && apt-get install -y unzip curl

          # Detect region and instance ID (IMDSv2)
          IMDS_TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600" 2>/dev/null || echo "")
          if [ -n "$IMDS_TOKEN" ]; then
            AWS_REGION=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null || echo "")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo "")
          else
            AWS_REGION=$(curl -s http://169.254.169.254/latest/meta-data/placement/region 2>/dev/null || echo "")
            INSTANCE_ID=$(curl -s http://169.254.169.254/latest/meta-data/instance-id 2>/dev/null || echo "")
          fi
          AWS_REGION=${!AWS_REGION:-"${AWS::Region}"}
          INSTANCE_ID=${!INSTANCE_ID:-"unknown"}
          echo "Region: $AWS_REGION | Instance: $INSTANCE_ID"

          # Install AWS CLI v2
          curl "https://awscli.amazonaws.com/awscli-exe-linux-$(arch).zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          ./aws/install
          rm -rf aws awscliv2.zip
          
          # SSM Agent
          snap start amazon-ssm-agent || systemctl start amazon-ssm-agent
          
          if [ "${EnableSandbox}" = "true" ]; then
            # Install Docker
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
            chmod a+r /etc/apt/keyrings/docker.asc
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io
            systemctl enable docker
            systemctl start docker
            usermod -aG docker ubuntu
          else
            echo "Skipping Docker"
          fi
          
          # Install Node.js
          sudo -u ubuntu bash << 'UBUNTU_SCRIPT'
          cd ~
          
          # Install NVM
          NVM_VERSION="v0.40.1"
          for i in 1 2 3; do
            curl -fsSL "https://raw.githubusercontent.com/nvm-sh/nvm/${!NVM_VERSION}/install.sh" -o /tmp/nvm-install.sh && break
            echo "NVM download attempt $i failed, retrying in 5s..."
            sleep 5
          done
          bash /tmp/nvm-install.sh
          rm -f /tmp/nvm-install.sh
          
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          
          # Install Node.js 22
          nvm install 22
          nvm use 22
          nvm alias default 22
          
          # Install OpenClaw
          npm config set registry https://registry.npmjs.org/
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            npm install -g openclaw@latest --timeout=300000 --ignore-scripts || {
              npm cache clean --force && npm install -g openclaw@latest --timeout=300000 --ignore-scripts; }
          else
            npm install -g openclaw@latest --timeout=300000 || {
              npm cache clean --force && npm install -g openclaw@latest --timeout=300000; }
          fi
          
          if ! grep -q 'NVM_DIR' ~/.bashrc; then
              echo 'export NVM_DIR="$HOME/.nvm"' >> ~/.bashrc
              echo '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"' >> ~/.bashrc
          fi
          UBUNTU_SCRIPT
          
          # Create openclaw wrapper
          OPENCLAW_MJS=$(find /home/ubuntu/.nvm -path "*/node_modules/openclaw/openclaw.mjs" 2>/dev/null | head -1)
          NODE_BIN=$(find /home/ubuntu/.nvm -name node -type f 2>/dev/null | head -1)
          [ -z "$OPENCLAW_MJS" ] || [ -z "$NODE_BIN" ] && { echo "FATAL: openclaw not found"; exit 1; }
          echo "#!/bin/bash" > /usr/local/bin/openclaw
          echo "exec $NODE_BIN $OPENCLAW_MJS \"\$@\"" >> /usr/local/bin/openclaw
          chmod +x /usr/local/bin/openclaw
          /usr/local/bin/openclaw --version || { echo "FATAL: openclaw broken"; exit 1; }
          
          # Configure AWS region
          sudo -u ubuntu mkdir -p /home/ubuntu/.aws
          sudo -u ubuntu bash -c "printf '[default]\nregion = %s\noutput = json\n' \"$AWS_REGION\" > /home/ubuntu/.aws/config"
          chown -R ubuntu:ubuntu /home/ubuntu/.aws
          chmod 600 /home/ubuntu/.aws/config
          
          # Configure environment
          {
            echo "export AWS_REGION=$AWS_REGION"
            echo "export AWS_DEFAULT_REGION=$AWS_REGION"
            echo "export AWS_PROFILE=default"
            echo "export OPENCLAW_MODEL=${OpenClawModel}"
            echo "export OPENCLAW_USE_BEDROCK=true"
          } >> /home/ubuntu/.bashrc
          
          # Create systemd environment file for services
          sudo -u ubuntu mkdir -p /home/ubuntu/.config/environment.d
          sudo -u ubuntu bash -c "{ echo AWS_REGION=$AWS_REGION; echo AWS_DEFAULT_REGION=$AWS_REGION; } > /home/ubuntu/.config/environment.d/aws.conf"
          
          # 启用 systemd linger
          loginctl enable-linger ubuntu
          systemctl start user@1000.service
          
          # Configure OpenClaw
          
          # Create config directory
          sudo -u ubuntu mkdir -p /home/ubuntu/.openclaw
          
          # Generate Gateway Token
          GATEWAY_TOKEN=$(openssl rand -hex 24)
          
          # Create Bedrock configuration file (write as ubuntu to ensure correct ownership)
          sudo -u ubuntu tee /home/ubuntu/.openclaw/openclaw.json > /dev/null << 'JSONEOF'
          {
            "gateway": {
              "mode": "local",
              "port": 18789,
              "bind": "loopback",
              "controlUi": {
                "enabled": true,
                "allowInsecureAuth": true
              },
              "auth": {
                "mode": "token",
                "token": "GATEWAY_TOKEN_PLACEHOLDER"
              }
            },
            "models": {
              "providers": {
                "amazon-bedrock": {
                  "baseUrl": "https://bedrock-runtime.REGION_PLACEHOLDER.amazonaws.com",
                  "api": "bedrock-converse-stream",
                  "auth": "aws-sdk",
                  "models": [
                    {
                      "id": "MODEL_ID_PLACEHOLDER",
                      "name": "Bedrock Model",
                      "input": ["text", "image"],
                      "contextWindow": 200000,
                      "maxTokens": 8192
                    }
                  ]
                }
              }
            },
            "agents": {
              "defaults": {
                "model": {
                  "primary": "amazon-bedrock/MODEL_ID_PLACEHOLDER"
                }
              }
            }
          }
          JSONEOF
          
          # Replace placeholders
          sed -i "s/GATEWAY_TOKEN_PLACEHOLDER/$GATEWAY_TOKEN/g" /home/ubuntu/.openclaw/openclaw.json
          sed -i "s/REGION_PLACEHOLDER/$AWS_REGION/g" /home/ubuntu/.openclaw/openclaw.json
          sed -i "s|MODEL_ID_PLACEHOLDER|${OpenClawModel}|g" /home/ubuntu/.openclaw/openclaw.json
          
          # Install and start gateway
          # Wait for user@1000 systemd session to be ready
          for i in $(seq 1 15); do
            if [ -S /run/user/1000/bus ]; then
              echo "User systemd session ready"
              break
            fi
            echo "Waiting for user session... $i/15"
            sleep 2
          done
          
          sudo -H -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus bash -c '
          export HOME=/home/ubuntu
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          openclaw gateway install || echo "Gateway install failed"
          systemctl --user start openclaw-gateway.service || { openclaw gateway & } || echo "Gateway start failed"
          '
          
          # Wait for daemon to be ready and verify port 18789 is listening
          echo "Waiting for OpenClaw daemon to start..."
          for i in $(seq 1 30); do
            if ss -tlnp 2>/dev/null | grep -q ':18789'; then
              echo "OpenClaw daemon is up on port 18789"
              break
            fi
            echo "Attempt $i/30: port 18789 not ready yet, waiting..."
            sleep 2
          done
          
          if ! ss -tlnp 2>/dev/null | grep -q ':18789'; then
            echo "WARNING: OpenClaw gateway did not start within 60s, trying fallback..."
            sudo -H -u ubuntu XDG_RUNTIME_DIR=/run/user/1000 bash -c '
            export HOME=/home/ubuntu
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
            systemctl --user restart openclaw-gateway.service || openclaw gateway &
            '
            sleep 5
          fi
          
          # Enable messaging channels
          sudo -H -u ubuntu bash -c '
          export HOME=/home/ubuntu
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          
          # Core channels (built-in)
          openclaw plugins enable whatsapp || echo "WhatsApp plugin enable failed"
          openclaw plugins enable telegram || echo "Telegram plugin enable failed"
          openclaw plugins enable discord || echo "Discord plugin enable failed"
          openclaw plugins enable slack || echo "Slack plugin enable failed"
          
          # Feishu/Lark (community plugin)
          npm install -g openclaw-feishu@latest --timeout=60000 2>/dev/null || echo "Feishu plugin install skipped"
          '
          
          # Create SOUL.md
          sudo -u ubuntu cat > /home/ubuntu/.openclaw/SOUL.md << 'SOUL_EOF'
          # OpenClaw on AWS
          You are an AI assistant on AWS with Bedrock. Be helpful, concise, friendly.
          On first message, greet the user and offer to connect a messaging platform (WhatsApp/Telegram/Discord/Slack/Feishu).
          Guide them through setup step by step via the Web UI.
          SOUL_EOF
          chown ubuntu:ubuntu /home/ubuntu/.openclaw/SOUL.md
          
          # Save token to SSM Parameter Store (encrypted, never written to disk)
          STACK_NAME="${AWS::StackName}"
          aws ssm put-parameter \
            --name "/openclaw/$STACK_NAME/gateway-token" \
            --value "$GATEWAY_TOKEN" \
            --type "SecureString" \
            --region $AWS_REGION \
            --overwrite || echo "Failed to save token to SSM"
          unset GATEWAY_TOKEN

          # Save instance info (non-secret metadata only)
          echo "$INSTANCE_ID" > /home/ubuntu/.openclaw/instance_id.txt
          echo "$AWS_REGION" > /home/ubuntu/.openclaw/region.txt

          # Create SSM access helper script
          cat > /home/ubuntu/ssm-portforward.sh << 'SSMEOF'
          #!/bin/bash
          IMDS_TOKEN=$(curl -s -X PUT http://169.254.169.254/latest/api/token -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
          IID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
          RGN=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/placement/region)
          STK=$(aws ec2 describe-tags --filters "Name=resource-id,Values=$IID" "Name=key,Values=aws:cloudformation:stack-name" --query "Tags[0].Value" --output text --region $RGN)
          TKN=$(aws ssm get-parameter --name "/openclaw/$STK/gateway-token" --with-decryption --query Parameter.Value --output text --region $RGN)
          echo "Run on local: aws ssm start-session --target $IID --region $RGN --document-name AWS-StartPortForwardingSession --parameters '{\"portNumber\":[\"18789\"],\"localPortNumber\":[\"18789\"]}'"
          echo "Open: http://localhost:18789/?token=$TKN"
          SSMEOF
          chmod +x /home/ubuntu/ssm-portforward.sh
          chown ubuntu:ubuntu /home/ubuntu/ssm-portforward.sh

          # Signal CloudFormation
          echo "[9/9] Signaling..."
          echo "SUCCESS" > /home/ubuntu/.openclaw/setup_status.txt
          echo "Setup completed: $(date)" >> /home/ubuntu/.openclaw/setup_status.txt

          apt-get install -y python3-pip 2>&1 | tee -a /var/log/openclaw-setup.log
          pip3 install --break-system-packages https://s3.amazonaws.com/cloudformation-examples/aws-cfn-bootstrap-py3-latest.tar.gz 2>&1 | tee -a /var/log/openclaw-setup.log || echo "cfn-bootstrap install failed, will use curl fallback"

          # Find cfn-signal location
          CFN_SIGNAL=$(which cfn-signal 2>/dev/null || find /usr -name cfn-signal 2>/dev/null | head -1)

          # Signal CloudFormation (token NOT included — retrieve from SSM)
          COMPLETE_MSG="OpenClaw ready. Run: aws ssm get-parameter --name /openclaw/$STACK_NAME/gateway-token --with-decryption --query Parameter.Value --output text --region $AWS_REGION"

          if [ -n "$CFN_SIGNAL" ]; then
            echo "Using cfn-signal: $CFN_SIGNAL"
            $CFN_SIGNAL -e 0 -d "$COMPLETE_MSG" -r "OpenClaw ready" '${OpenClawWaitHandle}'
          else
            echo "cfn-signal not found, using curl"
            SIGNAL_JSON="{\"Status\":\"SUCCESS\",\"Reason\":\"OpenClaw ready\",\"UniqueId\":\"openclaw\",\"Data\":\"$COMPLETE_MSG\"}"
            curl -X PUT -H "Content-Type:" --data-binary "$SIGNAL_JSON" "${OpenClawWaitHandle}"
          fi

          echo "Signal sent successfully"
          
          echo "=========================================="
          echo "OpenClaw installation complete!"
          echo "Token stored in SSM Parameter Store"
          echo "=========================================="
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-instance"

Outputs:
  Step1InstallSSMPlugin:
    Description: "STEP 1: Install SSM Session Manager Plugin on your local computer"
    Value: "https://docs.aws.amazon.com/systems-manager/latest/userguide/session-manager-working-with-install-plugin.html"

  Step2PortForwarding:
    Description: "STEP 2: Run this command on LOCAL computer (keep terminal open)"
    Value: !Sub |
      aws ssm start-session --target ${OpenClawInstance} --region ${AWS::Region} --document-name AWS-StartPortForwardingSession --parameters '{"portNumber":["18789"],"localPortNumber":["18789"]}'

  Step3GetToken:
    Description: "STEP 3: Get your access token"
    Value: !Sub |
      aws ssm get-parameter --name /openclaw/${AWS::StackName}/gateway-token --with-decryption --query Parameter.Value --output text --region ${AWS::Region}

  Step4StartChatting:
    Description: "STEP 4: Start using OpenClaw!"
    Value: "Connect WhatsApp, Telegram, Discord. See README: https://github.com/aws-samples/sample-OpenClaw-on-AWS-with-Bedrock"

  InstanceId:
    Description: "EC2 Instance ID (for reference)"
    Value: !Ref OpenClawInstance

  BedrockModel:
    Description: "Bedrock model in use"
    Value: !Ref OpenClawModel

  MonthlyCost:
    Description: "Estimated monthly cost (USD) — VPC Endpoints are shared via vpc-shared.yaml"
    Value: !Sub |
      EC2 (${InstanceType}): ~$20-40 (Graviton instances 20% cheaper)
      EBS (30GB): ~$2.40
      VPC Endpoints: Shared (see vpc-shared stack)
      Bedrock: Pay-per-use
      Total per user: ~$23-43/month
      Note: Graviton (ARM64) instances offer better price-performance ratio

  InstanceArchitecture:
    Description: "Instance architecture"
    Value: !FindInMap [ArchitectureMap, !Ref InstanceType, Arch]

  DataVolumeIdRetained:
    Condition: ProtectData
    Description: "Data volume ID (retained on stack delete)"
    Value: !Ref OpenClawDataVolumeRetained

  DataVolumeIdNotRetained:
    Condition: DeleteData
    Description: "Data volume ID (deleted with stack)"
    Value: !Ref OpenClawDataVolumeNotRetained
